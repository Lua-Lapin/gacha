<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>役職ガチャ ギャラリー 🍸</title>
    <style>
      :root {
        --gacha-accent: #e63946;
        --gacha-ink: #2b2b3a;
        --gacha-muted: #666;
        --gacha-panel: #fff7f2;
        --gacha-panel-border: #ffd9c2;
        --gacha-radius: 12px;
      }
      body {
        font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        margin: 0; padding: 2.5rem 1.5rem 4rem;
        background: linear-gradient(#fff5f5, #ffe3e3);
        color: var(--gacha-ink);
        min-height: 100vh;
      }
      h1 { text-align: center; margin: 0 0 2rem; font-size: 2rem; }
      #gallery {
        max-width: 1100px; margin: 0 auto;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem;
      }
      .card {
        margin: 0; background: var(--gacha-panel);
        border: 1px solid var(--gacha-panel-border);
        border-radius: var(--gacha-radius); overflow: hidden;
        box-shadow: 0 6px 16px rgba(230, 57, 70, 0.1);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(230, 57, 70, 0.18); }
      .card img { width: 100%; display: block; aspect-ratio: 1; object-fit: cover; }
      figcaption { padding: 0.85rem 1rem; display: flex; flex-direction: column; gap: 0.3rem; }
      .title { font-weight: 800; color: var(--gacha-accent); }
      .name { color: var(--gacha-muted); font-size: 0.9rem; }
      .tweet {
        margin-top: 0.5rem; align-self: flex-start;
        display: inline-flex; align-items: center; gap: 0.35rem;
        padding: 0.4rem 0.85rem; border-radius: 999px;
        background: #000; color: #fff; text-decoration: none;
        font-size: 0.85rem; font-weight: 700;
        transition: opacity 0.15s ease;
      }
      .tweet:hover { opacity: 0.8; }
      .empty { text-align: center; color: var(--gacha-muted); }
    </style>
  </head>
  <body>
    <h1>役職ガチャ ギャラリー 🍸</h1>
    <div id="gallery"></div>
    <script type="module" src="main.js"></script>
  </body>
</html>
